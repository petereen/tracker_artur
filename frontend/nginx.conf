server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

#    location /api/ {
        # Backend is a separate (internal-ingress) Container App in the same
        # environment. Resolved at startup via the container's internal DNS,
        # which knows the *.internal.<env> names. Trailing slash strips /api/.
        # proxy_pass https://ca-tracker-artur-api.internal.wittyhill-ad6320ed.northeurope.azurecontainerapps.io:443/;
        # proxy_set_header Host ca-tracker-artur-api.internal.wittyhill-ad6320ed.northeurope.azurecontainerapps.io;
        # proxy_ssl_server_name on;
        # proxy_ssl_name ca-tracker-artur-api.internal.wittyhill-ad6320ed.northeurope.azurecontainerapps.io;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    # }
    location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
