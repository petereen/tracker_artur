services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d sales_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://tracker:secret@db/sales_tracker
      SYNC_DATABASE_URL: postgresql+psycopg2://tracker:secret@db/sales_tracker
      SECRET_KEY: change_me_in_production_please
      BOT_TOKEN: ${BOT_TOKEN:-}
      MANAGER_TG_ID: ${MANAGER_TG_ID:-306983322}
      ADMIN_EMAIL: admin@company.ru
      ADMIN_PASSWORD: admin123
    ports:
      - "8010:8000"

  bot:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://tracker:secret@db/sales_tracker
      SYNC_DATABASE_URL: postgresql+psycopg2://tracker:secret@db/sales_tracker
      SECRET_KEY: change_me_in_production_please
      BOT_TOKEN: ${BOT_TOKEN:-}
      MANAGER_TG_ID: ${MANAGER_TG_ID:-306983322}
      ADMIN_EMAIL: admin@company.ru
      ADMIN_PASSWORD: admin123
    command: python -m app.bot.main

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3010:80"

volumes:
  pgdata:
