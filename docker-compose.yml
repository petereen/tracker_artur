services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d sales_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      BOT_TOKEN: ${BOT_TOKEN:-}
      MANAGER_TG_ID: ${MANAGER_TG_ID:-306983322}
      MINI_APP_URL: ${MINI_APP_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_WHISPER_MODEL: ${OPENAI_WHISPER_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_MONGOLIAN_TRANSCRIBE_MODEL: ${OPENAI_MONGOLIAN_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_TASK_MODEL: ${OPENAI_TASK_MODEL:-gpt-4o-mini}
      OPENAI_ASSISTANT_MODEL: ${OPENAI_ASSISTANT_MODEL:-}
      OPENAI_TRANSCRIBE_LANGUAGE: ${OPENAI_TRANSCRIBE_LANGUAGE:-}
      CHIMEGE_API_TOKEN: ${CHIMEGE_API_TOKEN:-}
      CHIMEGE_PUNCTUATE: ${CHIMEGE_PUNCTUATE:-true}
    ports:
      # Keep the API private; the frontend proxies /api/ to it on the Docker network.
      - "127.0.0.1:8010:8000"
    volumes:
      - knowledge_uploads:/app/uploads/knowledge

  bot:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      BOT_TOKEN: ${BOT_TOKEN:-}
      MANAGER_TG_ID: ${MANAGER_TG_ID:-306983322}
      MINI_APP_URL: ${MINI_APP_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_WHISPER_MODEL: ${OPENAI_WHISPER_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_MONGOLIAN_TRANSCRIBE_MODEL: ${OPENAI_MONGOLIAN_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_TASK_MODEL: ${OPENAI_TASK_MODEL:-gpt-4o-mini}
      OPENAI_ASSISTANT_MODEL: ${OPENAI_ASSISTANT_MODEL:-}
      OPENAI_TRANSCRIBE_LANGUAGE: ${OPENAI_TRANSCRIBE_LANGUAGE:-}
      CHIMEGE_API_TOKEN: ${CHIMEGE_API_TOKEN:-}
      CHIMEGE_PUNCTUATE: ${CHIMEGE_PUNCTUATE:-true}
    command: python -m app.bot.main

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # The host Nginx vhost for artur.oyuns.mn is the only public entry point.
      - "127.0.0.1:3010:80"
    networks:
      default: {}
      # Lets the shared Nginx edge proxy reach this container.
      web-edge:
        aliases:
          - oyuns-agent-frontend

volumes:
  pgdata:
  knowledge_uploads:

networks:
  web-edge:
    external: true
