# Install in the shared proxy at:
# /root/oyunswebapp/nginx/conf.d/artur.oyuns.mn.conf
#
# Prerequisite: docker compose in this project has been restarted so its
# frontend joins the external oyunswebapp_default network.
server {
    listen 80;
    server_name artur.oyuns.mn;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name artur.oyuns.mn;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/artur.oyuns.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artur.oyuns.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://tracker_artur-frontend-1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
