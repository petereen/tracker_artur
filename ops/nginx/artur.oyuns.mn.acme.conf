# Temporary HTTP-only vhost. Install this before issuing the certificate, then
# replace it with artur.oyuns.mn.shared-proxy.conf.
server {
    listen 80;
    server_name artur.oyuns.mn;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
