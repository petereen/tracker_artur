# Install this as /etc/nginx/sites-available/artur.oyuns.mn on the host.
# It is an independent vhost: do not replace the existing oyuns.mn config.
server {
    listen 80;
    listen [::]:80;
    server_name artur.oyuns.mn;

    # Lets Certbot serve its ACME validation file before it adds TLS settings.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
